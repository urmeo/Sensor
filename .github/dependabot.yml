version: 2
updates:
  # Python dependencies (requirements.txt at repo root)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    groups:
      python:
        patterns: ["*"]
    ignore:
      # numpy >= 2.5 requires Python >= 3.12; drop when 3.11 leaves the CI matrix
      - dependency-name: "numpy"
        versions: [">=2.5.0"]

  # GitHub Actions used in the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]
